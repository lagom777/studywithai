<main><header class="paper-header"><h1><em>역사</em></h1><p class="authors">Vol. 17 · May 2026</p></header>
<div class="scene-3d" id="intro-scene"></div><span class="interact-hint">📜 인터랙티브 3D 시각화</span>
<h2>소개</h2><p>이 사이트에서는 역사의 핵심 개념을 9개 챕터에 걸쳐 3D 인터랙티브로 학습합니다.</p></main></div>
<script>(function(){const c=document.getElementById('intro-scene');const s=new THREE.Scene();const cam=new THREE.PerspectiveCamera(50,c.clientWidth/c.clientHeight,0.1,1000);cam.position.set(0,4,10);const r=new THREE.WebGLRenderer({antialias:true,alpha:true});r.setSize(c.clientWidth,c.clientHeight);r.setPixelRatio(Math.min(window.devicePixelRatio,2));c.appendChild(r.domElement);for(let i=0;i<15;i++){const m=new THREE.Mesh(new THREE.DodecahedronGeometry(0.3,0),new THREE.MeshBasicMaterial({color:Math.random()*0xffffff,wireframe:true}));m.position.set((Math.random()-0.5)*8,(Math.random()-0.5)*5,(Math.random()-0.5)*5);s.add(m);}function a(){requestAnimationFrame(a);s.rotation.y+=0.003;r.render(s,cam);}a();window.addEventListener('resize',()=>{cam.aspect=c.clientWidth/c.clientHeight;cam.updateProjectionMatrix();r.setSize(c.clientWidth,c.clientHeight);});})();</script></body></html>
